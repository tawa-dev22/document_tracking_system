server {
    listen 80;
    server_name localhost;

    # Gzip Compression for performance
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve React App
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Try to serve file, otherwise fallback to index.html for React Router
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy for API exactly matching our backend NodeJS container
    location /api/ {
        # 'backend' is the service-name defined in docker-compose.yml
        proxy_pass http://backend:5000/api/;
        
        # Security & Proxy Awareness Core
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for document uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Reverse Proxy for Socket.IO
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
